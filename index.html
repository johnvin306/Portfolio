<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darvin - Portfolio</title>

    <!-- React CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
        }

        html {
            scroll-behavior: smooth;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .animate-spin-slow {
            animation: spin 4s linear infinite;
        }

        .animate-spin-reverse {
            animation: spin 3s linear infinite reverse;
        }

        .animate-fadeIn {
            animation: fadeIn 0.5s ease-out;
        }

        .typing-cursor::after {
            content: '|';
            animation: blink 1s infinite;
        }

        @keyframes blink {

            0%,
            50% {
                opacity: 1;
            }

            51%,
            100% {
                opacity: 0;
            }
        }

        .gradient-text {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        /* Lucide icons fix */
        .lucide {
            width: 24px;
            height: 24px;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        // React hooks from global React object
        const { useState, useEffect, useRef, useCallback } = React;

        // Lucide icons - create SVG components manually since CDN doesn't expose them properly
        const IconWrapper = ({ children, size = 24 }) => (
            <svg
                xmlns="http://www.w3.org/2000/svg"
                width={size}
                height={size}
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                strokeWidth="2"
                strokeLinecap="round"
                strokeLinejoin="round"
                className="inline-block"
            >
                {children}
            </svg>
        );

        const Github = ({ size }) => (
            <IconWrapper size={size}>
                <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22" />
            </IconWrapper>
        );

        const Linkedin = ({ size }) => (
            <IconWrapper size={size}>
                <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z" />
                <rect x="2" y="9" width="4" height="12" />
                <circle cx="4" cy="4" r="2" />
            </IconWrapper>
        );

        const Twitter = ({ size }) => (
            <IconWrapper size={size}>
                <path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z" />
            </IconWrapper>
        );

        const Instagram = ({ size }) => (
            <IconWrapper size={size}>
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5" />
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" />
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5" />
            </IconWrapper>
        );

        const Facebook = ({ size }) => (
            <IconWrapper size={size}>
                <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z" />
            </IconWrapper>
        );

        const Mail = ({ size }) => (
            <IconWrapper size={size}>
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                <polyline points="22,6 12,13 2,6" />
            </IconWrapper>
        );

        const Phone = ({ size }) => (
            <IconWrapper size={size}>
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />
            </IconWrapper>
        );

        const MapPin = ({ size }) => (
            <IconWrapper size={size}>
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                <circle cx="12" cy="10" r="3" />
            </IconWrapper>
        );

        const ExternalLink = ({ size }) => (
            <IconWrapper size={size}>
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
                <polyline points="15,3 21,3 21,9" />
                <line x1="10" y1="14" x2="21" y2="3" />
            </IconWrapper>
        );

        const Download = ({ size }) => (
            <IconWrapper size={size}>
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="7,10 12,15 17,10" />
                <line x1="12" y1="15" x2="12" y2="3" />
            </IconWrapper>
        );

        const Send = ({ size }) => (
            <IconWrapper size={size}>
                <line x1="22" y1="2" x2="11" y2="13" />
                <polygon points="22 2 15 22 11 13 2 9 22 2" />
            </IconWrapper>
        );

        const Code = ({ size }) => (
            <IconWrapper size={size}>
                <polyline points="16,18 22,12 16,6" />
                <polyline points="8,6 2,12 8,18" />
            </IconWrapper>
        );

        const Heart = ({ size, className }) => (
            <IconWrapper size={size}>
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" className={className} />
            </IconWrapper>
        );

        const ArrowUp = ({ size }) => (
            <IconWrapper size={size}>
                <line x1="12" y1="19" x2="12" y2="5" />
                <polyline points="5,12 12,5 19,12" />
            </IconWrapper>
        );

        const Database = ({ size }) => (
            <IconWrapper size={size}>
                <ellipse cx="12" cy="5" rx="9" ry="3" />
                <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3" />
                <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5" />
            </IconWrapper>
        );

        const ShoppingCart = ({ size }) => (
            <IconWrapper size={size}>
                <circle cx="9" cy="21" r="1" />
                <circle cx="20" cy="21" r="1" />
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
            </IconWrapper>
        );

        const Tasks = ({ size }) => (
            <IconWrapper size={size}>
                <line x1="8" y1="6" x2="21" y2="6" />
                <line x1="8" y1="12" x2="21" y2="12" />
                <line x1="8" y1="18" x2="21" y2="18" />
                <line x1="3" y1="6" x2="3.01" y2="6" />
                <line x1="3" y1="12" x2="3.01" y2="12" />
                <line x1="3" y1="18" x2="3.01" y2="18" />
            </IconWrapper>
        );

        const Hospital = ({ size }) => (
            <IconWrapper size={size}>
                <path d="M2 22V8a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v14" />
                <path d="M2 22h20" />
                <path d="M12 2v4" />
                <path d="M10 4h4" />
                <path d="M6 22v-4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v4" />
                <path d="M12 14h.01" />
            </IconWrapper>
        );

        // Particle Canvas Component
        const ParticleCanvas = () => {
            const canvasRef = useRef(null);
            const particlesRef = useRef([]);
            const animationRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;

                const ctx = canvas.getContext('2d');

                const resizeCanvas = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                };

                class Particle {
                    constructor() {
                        this.x = Math.random() * canvas.width;
                        this.y = Math.random() * canvas.height;
                        this.size = Math.random() * 2 + 1;
                        this.speedX = Math.random() * 1 - 0.5;
                        this.speedY = Math.random() * 1 - 0.5;
                        this.opacity = Math.random() * 0.5 + 0.2;
                    }

                    update() {
                        this.x += this.speedX;
                        this.y += this.speedY;

                        if (this.x > canvas.width) this.x = 0;
                        if (this.x < 0) this.x = canvas.width;
                        if (this.y > canvas.height) this.y = 0;
                        if (this.y < 0) this.y = canvas.height;
                    }

                    draw() {
                        ctx.fillStyle = `rgba(102, 126, 234, ${this.opacity})`;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                const initParticles = () => {
                    particlesRef.current = [];
                    for (let i = 0; i < 50; i++) {
                        particlesRef.current.push(new Particle());
                    }
                };

                const animateParticles = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    particlesRef.current.forEach(particle => {
                        particle.update();
                        particle.draw();
                    });

                    particlesRef.current.forEach((a, index) => {
                        particlesRef.current.slice(index + 1).forEach(b => {
                            const dx = a.x - b.x;
                            const dy = a.y - b.y;
                            const distance = Math.sqrt(dx * dx + dy * dy);

                            if (distance < 100) {
                                ctx.strokeStyle = `rgba(102, 126, 234, ${0.2 * (1 - distance / 100)})`;
                                ctx.lineWidth = 1;
                                ctx.beginPath();
                                ctx.moveTo(a.x, a.y);
                                ctx.lineTo(b.x, b.y);
                                ctx.stroke();
                            }
                        });
                    });

                    animationRef.current = requestAnimationFrame(animateParticles);
                };

                resizeCanvas();
                initParticles();
                animateParticles();

                window.addEventListener('resize', resizeCanvas);

                return () => {
                    window.removeEventListener('resize', resizeCanvas);
                    if (animationRef.current) {
                        cancelAnimationFrame(animationRef.current);
                    }
                };
            }, []);

            return (
                <canvas
                    ref={canvasRef}
                    className="absolute inset-0 w-full h-full pointer-events-none"
                    style={{ zIndex: 0 }}
                />
            );
        };

        // Skills Carousel Component
        const SkillsCarousel = () => {
            const [currentRotation, setCurrentRotation] = useState(0);
            const [isDragging, setIsDragging] = useState(false);
            const [startX, setStartX] = useState(0);
            const [currentX, setCurrentX] = useState(0);
            const containerRef = useRef(null);
            const autoRotateRef = useRef(null);
            const inactivityRef = useRef(null);

            const skills = [
                { icon: 'html5', name: 'HTML5', desc: 'Semantic markup' },
                { icon: 'css3', name: 'CSS3', desc: 'Responsive design' },
                { icon: 'javascript', name: 'JavaScript', desc: 'Interactive functionality' },
                { icon: 'java', name: 'Java', desc: 'Object-oriented programming' },
                { icon: 'php', name: 'PHP', desc: 'Backend development' },
                { icon: 'database', name: 'MySQL', desc: 'Database management' },
                { icon: 'react', name: 'React', desc: 'Modern frontend' },
            ];

            const cardCount = skills.length;
            const anglePerCard = 360 / cardCount;

            const updateRotation = useCallback((newRotation) => {
                setCurrentRotation(newRotation);
            }, []);

            const rotateTo = useCallback((index) => {
                updateRotation(-index * anglePerCard);
            }, [anglePerCard, updateRotation]);

            const startAutoRotate = useCallback(() => {
                if (autoRotateRef.current) clearInterval(autoRotateRef.current);
                autoRotateRef.current = setInterval(() => {
                    if (!isDragging) {
                        setCurrentRotation(prev => prev - 0.2);
                    }
                }, 50);
            }, [isDragging]);

            const stopAutoRotate = useCallback(() => {
                if (autoRotateRef.current) {
                    clearInterval(autoRotateRef.current);
                    autoRotateRef.current = null;
                }
            }, []);

            const resetInactivityTimer = useCallback(() => {
                stopAutoRotate();
                if (inactivityRef.current) clearTimeout(inactivityRef.current);
                inactivityRef.current = setTimeout(startAutoRotate, 3000);
            }, [stopAutoRotate, startAutoRotate]);

            useEffect(() => {
                resetInactivityTimer();
                return () => {
                    stopAutoRotate();
                    if (inactivityRef.current) clearTimeout(inactivityRef.current);
                };
            }, [resetInactivityTimer, stopAutoRotate]);

            const handleMouseDown = (e) => {
                setIsDragging(true);
                setStartX(e.clientX);
                setCurrentX(e.clientX);
            };

            const handleMouseMove = (e) => {
                if (!isDragging) return;
                setCurrentX(e.clientX);
            };

            const handleMouseUp = () => {
                if (!isDragging) return;
                setIsDragging(false);
                const diff = currentX - startX;
                const newRotation = currentRotation + diff * 0.5;
                const snapAngle = Math.round(newRotation / anglePerCard) * anglePerCard;
                updateRotation(snapAngle);
                resetInactivityTimer();
            };

            const handleTouchStart = (e) => {
                setIsDragging(true);
                setStartX(e.touches[0].clientX);
                setCurrentX(e.touches[0].clientX);
            };

            const handleTouchMove = (e) => {
                if (!isDragging) return;
                setCurrentX(e.touches[0].clientX);
            };

            const handleTouchEnd = () => {
                if (!isDragging) return;
                setIsDragging(false);
                const diff = currentX - startX;
                const newRotation = currentRotation + diff * 0.5;
                const snapAngle = Math.round(newRotation / anglePerCard) * anglePerCard;
                updateRotation(snapAngle);
                resetInactivityTimer();
            };

            const getCardStyle = (index) => {
                const angle = index * anglePerCard;
                return {
                    transform: `rotateY(${angle}deg) translateZ(350px)`,
                };
            };

            const getActiveIndex = () => {
                let activeIndex = Math.round((-currentRotation / anglePerCard) % cardCount);
                return ((activeIndex % cardCount) + cardCount) % cardCount;
            };

            const activeIndex = getActiveIndex();

            const getIcon = (iconName) => {
                switch (iconName) {
                    case 'html5': return <i className="fab fa-html5 text-6xl"></i>;
                    case 'css3': return <i className="fab fa-css3-alt text-6xl"></i>;
                    case 'javascript': return <i className="fab fa-js text-6xl"></i>;
                    case 'java': return <i className="fab fa-java text-6xl"></i>;
                    case 'php': return <i className="fab fa-php text-6xl"></i>;
                    case 'database': return <Database size={64} />;
                    case 'react': return <i className="fab fa-react text-6xl"></i>;
                    default: return null;
                }
            };

            return (
                <div className="w-full max-w-6xl mx-auto px-8">
                    <div
                        ref={containerRef}
                        className="relative h-[450px] flex justify-center cursor-grab active:cursor-grabbing"
                        style={{ perspective: '1000px' }}
                        onMouseDown={handleMouseDown}
                        onMouseMove={handleMouseMove}
                        onMouseUp={handleMouseUp}
                        onMouseLeave={handleMouseUp}
                        onTouchStart={handleTouchStart}
                        onTouchMove={handleTouchMove}
                        onTouchEnd={handleTouchEnd}
                    >
                        <div
                            className="relative w-[300px] h-[400px] transition-transform duration-800"
                            style={{
                                transformStyle: 'preserve-3d',
                                transform: `rotateY(${currentRotation + (isDragging ? (currentX - startX) * 0.5 : 0)}deg)`
                            }}
                        >
                            {skills.map((skill, index) => (
                                <div
                                    key={skill.name}
                                    className="absolute w-[280px] h-[360px] left-[10px] top-[20px] rounded-[20px] cursor-pointer"
                                    style={{
                                        ...getCardStyle(index),
                                        transformStyle: 'preserve-3d',
                                        zIndex: Math.round(100 - Math.abs(((index * anglePerCard - currentRotation) % 360 + 360) % 360 - 180))
                                    }}
                                    onClick={(e) => {
                                        e.stopPropagation();
                                        if (index === activeIndex) {
                                            updateRotation(currentRotation - 180);
                                        } else {
                                            rotateTo(index);
                                        }
                                        resetInactivityTimer();
                                    }}
                                >
                                    <div className="absolute inset-0 rounded-[20px] overflow-hidden z-[-2]">
                                        <div
                                            className="absolute w-[150%] h-[150%] top-[-25%] left-[-25%]"
                                            style={{
                                                backgroundImage: 'conic-gradient(transparent 0deg, transparent 90deg, #667eea 90deg, #764ba2 180deg, transparent 180deg, transparent 270deg, #667eea 270deg, #764ba2 360deg)',
                                                animation: 'spin 4s linear infinite'
                                            }}
                                        />
                                        <div className="absolute inset-[5px] bg-[#07182E] rounded-[15px]" />
                                    </div>
                                    <div className="absolute inset-[5px] w-[calc(100%-10px)] h-[calc(100%-10px)] bg-[#07182E] rounded-[15px] flex flex-col items-center justify-center z-[1] p-5">
                                        <div
                                            className="mb-5"
                                            style={{
                                                background: 'linear-gradient(135deg, #667eea, #764ba2)',
                                                WebkitBackgroundClip: 'text',
                                                WebkitTextFillColor: 'transparent'
                                            }}
                                        >
                                            {getIcon(skill.icon)}
                                        </div>
                                        <h3 className="text-2xl text-white mb-2">{skill.name}</h3>
                                        <p className="text-white/70 text-center">{skill.desc}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="flex justify-center gap-4 mt-8">
                        {skills.map((_, index) => (
                            <button
                                key={index}
                                onClick={() => {
                                    rotateTo(index);
                                    resetInactivityTimer();
                                }}
                                className={`w-3 h-3 rounded-full transition-all duration-300 border-2 border-transparent ${index === activeIndex
                                    ? 'bg-[#667eea] shadow-[0_0_20px_#667eea]'
                                    : 'bg-white/30 hover:bg-white/60 hover:scale-125'
                                    }`}
                            />
                        ))}
                    </div>

                    <p className="text-center mt-5 text-white/50 text-sm">
                        Click any card to rotate • Drag to spin • Auto-rotates when idle
                    </p>
                </div>
            );
        };

        // Testimonials Component
        const Testimonials = () => {
            const [current, setCurrent] = useState(0);

            const testimonials = [
                {
                    image: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150&h=150&fit=crop",
                    text: "Darvin delivered an exceptional website that exceeded our expectations. His attention to detail and technical skills are impressive.",
                    name: "Sarah Johnson",
                    role: "CEO, TechStart Inc."
                },
                {
                    image: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=150&h=150&fit=crop",
                    text: "Professional, responsive, and incredibly talented. The e-commerce platform he built increased our sales by 40%.",
                    name: "Michael Chen",
                    role: "Owner, Digital Store"
                },
                {
                    image: "https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=150&h=150&fit=crop",
                    text: "Working with Darvin was a breeze. He understood our requirements perfectly and delivered on time.",
                    name: "Emily Rodriguez",
                    role: "Marketing Director"
                }
            ];

            useEffect(() => {
                const interval = setInterval(() => {
                    setCurrent(prev => (prev + 1) % testimonials.length);
                }, 5000);
                return () => clearInterval(interval);
            }, [testimonials.length]);

            return (
                <div className="max-w-3xl mx-auto">
                    {testimonials.map((testimonial, index) => (
                        <div
                            key={index}
                            className={`bg-[#1a1a1a] p-12 rounded-[20px] border border-white/10 text-center ${index === current ? 'block animate-fadeIn' : 'hidden'
                                }`}
                        >
                            <img
                                src={testimonial.image}
                                alt={testimonial.name}
                                className="w-24 h-24 rounded-full mx-auto mb-6 border-[3px] border-[#667eea]"
                            />
                            <p className="italic text-[#a0a0a0] mb-6 text-xl leading-relaxed">
                                "{testimonial.text}"
                            </p>
                            <h4 className="text-[#667eea] mb-1">{testimonial.name}</h4>
                            <small className="text-[#888]">{testimonial.role}</small>
                        </div>
                    ))}

                    <div className="flex justify-center gap-2 mt-8">
                        {testimonials.map((_, index) => (
                            <button
                                key={index}
                                onClick={() => setCurrent(index)}
                                className={`w-3 h-3 rounded-full transition-colors duration-300 ${index === current ? 'bg-[#667eea]' : 'bg-white/20 hover:bg-white/40'
                                    }`}
                            />
                        ))}
                    </div>
                </div>
            );
        };

        // Counter Component
        const Counter = ({ target, suffix = "" }) => {
            const [count, setCount] = useState(0);
            const ref = useRef(null);
            const hasAnimated = useRef(false);

            useEffect(() => {
                const observer = new IntersectionObserver(
                    (entries) => {
                        entries.forEach((entry) => {
                            if (entry.isIntersecting && !hasAnimated.current) {
                                hasAnimated.current = true;
                                let current = 0;
                                const increment = target / 50;
                                const timer = setInterval(() => {
                                    current += increment;
                                    if (current >= target) {
                                        setCount(target);
                                        clearInterval(timer);
                                    } else {
                                        setCount(Math.ceil(current));
                                    }
                                }, 30);
                            }
                        });
                    },
                    { threshold: 0.5 }
                );

                                            )}
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="bg-[#1a1a1a] border-t border-white/10 pt-12 pb-4">
                        <div className="max-w-[1400px] mx-auto px-8 text-center">
                            <div className="flex flex-col items-center gap-8">
                                <div className="text-3xl font-bold bg-gradient-to-r from-[#667eea] to-[#764ba2] bg-clip-text text-transparent">
                                    Darvin.
                                </div>

                                <div className="flex gap-4">
                                    {[Github, Linkedin, Twitter, Instagram, Facebook].map((Icon, index) => (
                                        <a
                                            key={index}
                                            href="#"
                                            className="w-12 h-12 rounded-full bg-[#0a0a0a] border border-white/10 flex items-center justify-center text-white hover:bg-[#667eea] hover:-translate-y-1 transition-all duration-300"
                                        >
                                            <Icon size={20} />
                                        </a>
                                    ))}
                                </div>

                                <div className="flex flex-wrap gap-8 justify-center">
                                    {['Home', 'About', 'Projects', 'Contact'].map((link) => (
                                        <a
                                            key={link}
                                            href={`#${link.toLowerCase()}`}
                                            className="text-[#a0a0a0] hover:text-[#667eea] transition-colors"
                                        >
                                            {link}
                                        </a>
                                    ))}
                                    <a href="resume.html" download className="text-[#a0a0a0] hover:text-[#667eea] transition-colors">
                                        Download CV
                                    </a>
                                </div>

                                <div className="w-full pt-8 border-t border-white/10 text-[#888]">
                                    <p>&copy; 2024 Darvin John. All rights reserved.</p>
                                    <p className="mt-2 flex items-center justify-center gap-2">
                                        <Code size={16} /> with <Heart size={16} className="text-[#e74c3c]" /> in Philippines
                                    </p>
                                </div>
                            </div>
                        </div>
                    </footer>

                    {/* Back to Top */}
                    <button
                        onClick={scrollToTop}
                        className={`fixed bottom-8 right-8 w-12 h-12 rounded-full bg-gradient-to-r from-[#667eea] to-[#764ba2] text-white flex items-center justify-center shadow-[0_5px_20px_rgba(102,126,234,0.3)] transition-all duration-300 z-[999] ${showBackToTop ? 'opacity-100 visible' : 'opacity-0 invisible'
                            } hover:-translate-y-1`}
                    >
                        <ArrowUp size={20} />
                    </button>

                    <style>{`
                        @keyframes spin {
                            from { transform: rotate(0deg); }
                            to { transform: rotate(360deg); }
                        }
                        @keyframes fadeIn {
                            from { opacity: 0; transform: translateX(20px); }
                            to { opacity: 1; transform: translateX(0); }
                        }
                        .animate-fadeIn {
                            animation: fadeIn 0.5s ease-out;
                        }
                        html {
                            scroll-behavior: smooth;
                        }
                    `}</style>
                </div>
            );
        };

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
